name: oy_site
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  
  flutter_libserialport: ^0.6.0 # Windows için destek

  cupertino_icons: ^1.0.8
  #firebase_core: ^4.2.1
  #firebase_auth: ^6.1.2
  #cloud_firestore: ^6.1.0
  #firebase_storage: ^13.0.4
  provider: ^6.1.5+1
  intl: ^0.20.2
  google_fonts: ^8.0.2
  flutter_spinkit: ^5.2.2
  responsive_framework: ^1.5.1
  fl_chart: ^1.1.1
  csv: ^6.0.0 
  model_viewer_plus: 1.9.3
  file_picker: ^6.1.1
  desktop_drop: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
